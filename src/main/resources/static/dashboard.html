
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Party Dashboard</title>
    <script>
        document.addEventListener("DOMContentLoaded", function(){
            
            async function verifyToken(){
                const token = localStorage.getItem("token");
                const response = await fetch("/api/verify",{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({"token":token})
                })
                const result = await response.json();
                if(!result.success){
                    window.location.href = "/login.html";
                }
            }
            verifyToken()
            
            setInterval(verifyToken,30000)
        })
    </script>
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f0f0f;
            color:white;
        }

        .navbar{
            width:100%;
            height:70px;
            background:#1a1a1a;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 30px;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
            color:red;
        }

        .nav-buttons{
            display:flex;
            gap:15px;
        }

        .nav-buttons button{
            padding:12px 20px;
            border:none;
            border-radius:8px;
            background:red;
            color:white;
            cursor:pointer;
            font-size:15px;
        }

        .container{
            width:100%;
            padding:30px;
        }

        .video-box{
            width:100%;
            background:#1a1a1a;
            border-radius:12px;
            padding:20px;
        }

        video{
            width:100%;
            border-radius:10px;
            background:black;
        }

        .video-title{
            margin-top:15px;
            font-size:22px;
        }

    </style>

</head>
<body>

<div class="navbar">

    <div class="logo">
        Watch Party
    </div>

    <div class="nav-buttons">

        <button onclick="window.location.href='/upload.html'">
            Upload Video
        </button>

        <button onclick="logout()">
            Logout
        </button>

    </div>

</div>

<div class="container">

    <div class="video-box">

        <video controls>

            <source
                src="sample.mp4"
                type="video/mp4"
            >

        </video>

        <div class="video-title">
            Uploaded Video will be played here!
        </div>

    </div>

</div>
</body>
</html>
