<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchParty</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f0f0f;
            color:white;
        }

        nav{
            width:100%;
            height:80px;
            background:#111;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 50px;
        }

        .logo{
            color:red;
            font-size:32px;
            font-weight:bold;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            font-size:18px;
        }

        .hero{
            height:90vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
            padding:20px;
        }

        .hero h1{
            font-size:70px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:22px;
            color:#ccc;
            max-width:700px;
            line-height:1.6;
        }

        .buttons{
            margin-top:40px;
        }

        .buttons a{
            text-decoration:none;
            padding:15px 35px;
            border-radius:8px;
            margin:10px;
            display:inline-block;
            font-size:18px;
        }

        .login-btn{
            background:red;
            color:white;
        }

        .register-btn{
            background:white;
            color:black;
        }

    </style>

</head>
<body>

<nav>

    <div class="logo">WatchParty</div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login.html">Login</a>
        <a href="/register.html">Register</a>
    </div>

</nav>

<section class="hero">

    <h1>Watch Together</h1>

    <p>
        Upload videos, create rooms and enjoy synchronized streaming
        with friends in real time.
    </p>

    <div class="buttons">
        <a href="/login.html" class="login-btn">Login</a>
        <a href="/register.html" class="register-btn">Register</a>
    </div>

</section>

</body>
</html>
