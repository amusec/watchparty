<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="js/loginScript.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f0f0f;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:#1a1a1a;
            padding:40px;
            width:400px;
            border-radius:12px;
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:20px;
            border:none;
            border-radius:8px;
            background:#2b2b2b;
            color:white;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            background:red;
            border:none;
            border-radius:8px;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        p{
            color:#ccc;
            text-align:center;
            margin-top:20px;
        }

        a{
            color:red;
            text-decoration:none;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h1>Login</h1>

    <form>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

        <button type="submit" id="submit">Login</button>

    </form>

    <p>
        Don't have account?
        <a href="/register.html">Register</a>
    </p>

</div>

</body>
</html>
